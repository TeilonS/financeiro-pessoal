spring.application.name=financeiro-pessoal

# H2 persistido em arquivo local (dados sobrevivem ao reinício)
spring.datasource.url=jdbc:h2:file:./data/financeiro;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA — update mantém o schema e os dados entre reinícios
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT (sobrescreva via variável de ambiente JWT_SECRET)
jwt.secret=${JWT_SECRET:dev-secret-key-minimo-256-bits-troque-em-producao}
jwt.expiration-ms=2592000000

# Upload de extrato
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
